# test-agent heal — composite action (#18)
#
# Boots the whole stack on the runner (Postgres in Docker, API + worker as
# background node processes), batch-heals the given specs, and emits:
#   - ::notice / ::warning annotations on the healed/refused spec files
#   - a job-summary table ($GITHUB_STEP_SUMMARY)
#   - pr-comment.md with verified diffs, exposed as `comment-path`
#
# SUGGESTIONS ONLY: every heal is dry-run; this action never pushes to the
# branch and never gates CI (the batch step's exit code is swallowed —
# read the `patched` output if you want to act on it).
#
# Runs inside this repo's checkout (`uses: ./.github/actions/heal`).
# Read docs/guides/SECURITY-CI.md before wiring secrets.

name: test-agent heal
description: Batch-heal failing Playwright specs (or run a steward suite-health report) and surface the results
inputs:
  openai-api-key:
    description: LLM key (pass a repo/org secret; never a fork-accessible value)
    required: true
  mode:
    description: "'heal' = batch-heal the glob; 'steward' = suite-health report into the job summary"
    required: false
    default: 'heal'
  runs:
    description: Steward mode — how many full-suite runs (flake detection needs ≥2)
    required: false
    default: '3'
  glob:
    description: Spec glob to heal (heal mode only)
    required: false
    default: 'tests/**/*.spec.ts'
  max-cost:
    description: Batch cost cap in USD — hard stop, remaining specs are skipped
    required: false
    default: '2'
  repo-name:
    description: Name to register the checkout under (fresh per runner)
    required: false
    default: 'ci-repo'
  skip-install:
    description: Set 'true' if the workflow already ran npm ci + build
    required: false
    default: 'false'
  open-pr:
    description: >-
      Trust rung 3 (heal mode only): apply verified patches on a branch and
      open a PR. Still never touches the source branch; a human merges.
      Requires github-token and contents+pull-requests write permissions.
    required: false
    default: 'false'
  github-token:
    description: Token for gh pr create when open-pr is 'true'
    required: false
    default: ''
outputs:
  comment-path:
    description: Path to pr-comment.md (post it with github-script if you want the PR comment)
    value: ${{ steps.batch.outputs.comment-path }}
  patched:
    description: Number of specs patched (verified green)
    value: ${{ steps.batch.outputs.patched }}
  total:
    description: Number of specs attempted
    value: ${{ steps.batch.outputs.total }}
  steward-id:
    description: Steward mode — manifest id to feed `agent batch --from-steward`
    value: ${{ steps.steward.outputs.steward-id }}
  heal-candidates:
    description: Steward mode — count of always-failing specs with a healable category
    value: ${{ steps.steward.outputs.heal-candidates }}
  report-path:
    description: Steward mode — steward-report artifact path on the runner
    value: ${{ steps.steward.outputs.report-path }}
  pr-url:
    description: open-pr mode — URL of the created PR ('' when nothing was patched)
    value: ${{ steps.open-pr.outputs.pr-url }}

runs:
  using: composite
  steps:
    - name: Install + build
      if: inputs.skip-install != 'true'
      shell: bash
      run: |
        npm ci
        npm run build
        npx playwright install chromium --with-deps

    - name: Start Postgres + migrate + seed
      shell: bash
      run: |
        docker compose up -d postgres
        bash scripts/db-wait-for-postgres.sh
        bash scripts/db-migrate.sh
        npx tsx scripts/db-seed-dev-tenant.ts

    - name: Start API + worker
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        API_PORT: '3001'
        NO_CACHE: '1'   # runner is shared infra — never reuse snapshot/LLM caches
      run: |
        node apps/api/dist/index.js  > /tmp/test-agent-api.log 2>&1 &
        node apps/worker/dist/index.js > /tmp/test-agent-worker.log 2>&1 &
        for i in $(seq 1 30); do
          curl -sf http://127.0.0.1:3001/v1/health > /dev/null && break
          sleep 1
        done
        curl -sf http://127.0.0.1:3001/v1/health

    - name: Register + onboard this checkout
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        TEST_AGENT_API: 'http://127.0.0.1:3001'
      run: |
        npx tsx scripts/test-agent.ts init . --name '${{ inputs.repo-name }}'
        npx tsx scripts/test-agent.ts repos

    - name: Steward suite-health report
      if: inputs.mode == 'steward'
      id: steward
      shell: bash
      env:
        TEST_AGENT_API: 'http://127.0.0.1:3001'
      run: |
        REPO_ID=$(npx tsx scripts/test-agent.ts repos | awk 'NR==1 {print $1}')
        # Exit swallowed for the same reason as heal mode: an unhealthy suite
        # is a report, not a CI failure.
        npx tsx scripts/test-agent.ts steward \
          --repo "$REPO_ID" \
          --runs '${{ inputs.runs }}' \
          --format github || true
        grep -q '^steward-id=' "$GITHUB_OUTPUT" 2>/dev/null || {
          echo 'steward-id='       >> "$GITHUB_OUTPUT"
          echo 'heal-candidates=0' >> "$GITHUB_OUTPUT"
          echo 'report-path='      >> "$GITHUB_OUTPUT"
        }

    - name: Batch heal (dry-run, suggestions only)
      if: inputs.mode != 'steward'
      id: batch
      shell: bash
      env:
        TEST_AGENT_API: 'http://127.0.0.1:3001'
      run: |
        REPO_ID=$(npx tsx scripts/test-agent.ts repos | awk 'NR==1 {print $1}')
        # Exit code intentionally swallowed: refusals are a valid outcome,
        # and this action never gates CI. `patched`/`total` carry the result.
        npx tsx scripts/test-agent.ts batch '${{ inputs.glob }}' \
          --repo "$REPO_ID" \
          --max-cost '${{ inputs.max-cost }}' \
          --format github || true
        # Ensure outputs exist even if the batch crashed before reporting
        grep -q '^comment-path=' "$GITHUB_OUTPUT" 2>/dev/null || {
          echo 'comment-path=' >> "$GITHUB_OUTPUT"
          echo 'patched=0'     >> "$GITHUB_OUTPUT"
          echo 'total=0'       >> "$GITHUB_OUTPUT"
        }

    - name: Open PR with verified patches (trust rung 3)
      if: inputs.mode != 'steward' && inputs.open-pr == 'true' && steps.batch.outputs.patched != '0'
      id: open-pr
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        TEST_AGENT_API: 'http://127.0.0.1:3001'
      run: |
        BATCH_ID=$(grep -oE '[0-9a-f-]{36}' <<< "$(dirname '${{ steps.batch.outputs.comment-path }}')" | tail -1)
        BRANCH="test-agent/heal-${GITHUB_RUN_ID}"
        git config user.name  'test-agent[bot]'
        git config user.email 'test-agent[bot]@users.noreply.github.com'
        git checkout -b "$BRANCH"
        npx tsx scripts/test-agent.ts apply --batch "$BATCH_ID"
        git add -A ':!local-artifacts'
        git commit -m "fix(tests): test-agent verified heals (batch ${BATCH_ID:0:8})"
        git push -u origin "$BRANCH"
        PR_URL=$(gh pr create \
          --title "test-agent: ${{ steps.batch.outputs.patched }} verified test heal(s)" \
          --body-file '${{ steps.batch.outputs.comment-path }}' \
          --head "$BRANCH")
        echo "pr-url=$PR_URL" >> "$GITHUB_OUTPUT"
        echo "::notice::Opened $PR_URL — human review + merge (rung 3 stops here)"

    - name: Surface service logs on failure
      if: failure()
      shell: bash
      run: |
        echo '::group::api.log'
        tail -100 /tmp/test-agent-api.log || true
        echo '::endgroup::'
        echo '::group::worker.log'
        tail -100 /tmp/test-agent-worker.log || true
        echo '::endgroup::'
