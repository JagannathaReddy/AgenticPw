<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Console</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <div>
          <p class="eyebrow">Playwright Specialist POC</p>
          <h1>Autonomous Agent Console</h1>
        </div>
        <div id="health-pill" class="pill pill-muted">Checking daemon…</div>
      </header>

      <section class="panel">
        <h2>New job</h2>
        <form id="submit-form" class="form-grid">
          <label class="span-2">
            Goal
            <textarea
              id="goal"
              rows="3"
              required
              placeholder="Log in with username alice and password secret. Expected: home page loads after login."
            ></textarea>
            <span id="goal-hint" class="hint">Use clear steps and an &quot;Expected …&quot; outcome so the agent knows when it is done.</span>
          </label>
          <label>
            Target URL
            <input id="url" type="url" required placeholder="https://your-app.example/login" />
            <span id="url-hint" class="hint"></span>
            <span id="memory-hint" class="hint" hidden></span>
          </label>
          <label>
            Max steps
            <input id="maxSteps" type="number" min="1" max="100" value="30" />
          </label>
          <div class="span-2 actions">
            <button type="submit" class="btn btn-primary">Run agent</button>
            <button type="button" id="example-goal" class="btn btn-ghost">Example goal</button>
          </div>
        </form>
        <p id="submit-error" class="error" hidden></p>
      </section>

      <div class="split">
        <section class="panel">
          <div class="panel-head">
            <h2>Recent jobs</h2>
            <button type="button" id="refresh-jobs" class="btn btn-ghost btn-sm">Refresh</button>
          </div>
          <ul id="job-list" class="job-list"></ul>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Job detail</h2>
            <div class="btn-row">
              <button type="button" id="cancel-job" class="btn btn-danger btn-sm" disabled>
                Cancel
              </button>
              <button type="button" id="bridge-job" class="btn btn-ghost btn-sm" disabled>
                Bridge / generate
              </button>
              <button type="button" id="verify-job" class="btn btn-ghost btn-sm" disabled>
                Verify tests
              </button>
            </div>
          </div>
          <div id="job-empty" class="empty">Select a job to view live events.</div>
          <div id="job-detail" hidden>
            <dl class="meta">
              <div><dt>Status</dt><dd id="detail-status"></dd></div>
              <div><dt>Job ID</dt><dd id="detail-id" class="mono"></dd></div>
              <div><dt>Goal</dt><dd id="detail-goal"></dd></div>
              <div><dt>URL</dt><dd id="detail-url" class="mono"></dd></div>
              <div><dt>Result</dt><dd id="detail-result"></dd></div>
              <div><dt>Loop</dt><dd id="detail-loop"></dd></div>
              <div><dt>Spec</dt><dd id="detail-spec" class="mono"></dd></div>
              <div><dt>Test</dt><dd id="detail-test" class="mono"></dd></div>
              <div><dt>Memory</dt><dd id="detail-memory" class="mono"></dd></div>
            </dl>
            <h3>Events</h3>
            <ol id="event-log" class="event-log"></ol>
            <pre id="bridge-output" class="bridge-output" hidden></pre>
          </div>
        </section>
      </div>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
