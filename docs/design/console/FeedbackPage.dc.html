<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; gap:16px; max-width:1180px;">
  <div style="background:#fff; border:1px solid #E4E6EB; border-radius:12px; padding:20px; display:flex; gap:40px;">
    <div><div style="font-size:11.5px; font-weight:700; color:#9CA3AF;">TOTAL FEEDBACK</div><div style="font-size:22px; font-weight:700; margin-top:4px;">{{ rows.length }}</div></div>
    <div><div style="font-size:11.5px; font-weight:700; color:#9CA3AF;">HELPFUL</div><div style="font-size:22px; font-weight:700; color:#16A34A; margin-top:4px;">{{ upCount }}</div></div>
    <div><div style="font-size:11.5px; font-weight:700; color:#9CA3AF;">NOT HELPFUL</div><div style="font-size:22px; font-weight:700; color:#DC2626; margin-top:4px;">{{ downCount }}</div></div>
  </div>

  <div style="background:#fff; border:1px solid #E4E6EB; border-radius:12px; overflow:hidden;">
    <div style="padding:14px 20px; border-bottom:1px solid #EEF0F2; font-size:13.5px; font-weight:700;">Notes gallery</div>
    <sc-for list="{{ rows }}" as="r" hint-placeholder-count="5">
      <div style="display:flex; gap:14px; padding:14px 20px; border-bottom:1px solid #F5F6F8;">
        <span style="font-size:18px;">{{ r.icon }}</span>
        <div style="flex:1;">
          <div style="display:flex; gap:10px; align-items:center;">
            <span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; color:#6B7280;">{{ r.shortId }}</span>
            <span style="font-size:11px; font-weight:700; padding:2px 8px; border-radius:6px; color:{{ r.flowFg }}; background:{{ r.flowBg }};">{{ r.flowLabel }}</span>
            <span style="font-size:12px; color:#9CA3AF;">{{ r.categoryLabel }} · {{ r.repo }}</span>
          </div>
          <div style="font-size:13px; color:#14161B; margin-top:4px;">{{ r.raw.feedbackNote }}</div>
        </div>
        <span style="font-size:11.5px; color:#9CA3AF; white-space:nowrap;">{{ r.relTime }}</span>
      </div>
    </sc-for>
    <sc-if value="{{ isEmpty }}">
      <div style="padding:40px; text-align:center; color:#9CA3AF;">No feedback yet.</div>
    </sc-if>
  </div>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1180, &quot;height&quot;: 700}}">
class Component extends DCLogic {
  renderVals() {
    const rows = (this.props.rows || []).map(r => ({ ...r, icon: r.feedback === 'up' ? '👍' : '👎' }));
    return {
      rows, isEmpty: rows.length === 0,
      upCount: rows.filter(r => r.feedback === 'up').length,
      downCount: rows.filter(r => r.feedback === 'down').length,
    };
  }
}

</script>
</body>
</html>
