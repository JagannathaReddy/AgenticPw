<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; gap:16px; max-width:1180px;">
  <sc-for list="{{ batches }}" as="b" hint-placeholder-count="2">
    <div style="background:#fff; border:1px solid #E4E6EB; border-radius:12px; padding:20px;">
      <div style="display:flex; align-items:center; gap:12px;">
        <span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:14px; font-weight:700;">{{ b.shortId }}</span>
        <span style="font-size:11px; font-weight:700; padding:3px 9px; border-radius:99px; color:{{ b.statusFg }}; background:{{ b.statusBg }};">{{ b.statusLabel }}</span>
        <span style="font-size:12px; color:#9CA3AF;">{{ b.repo }}</span>
        <div style="flex:1;"></div>
        <span style="font-size:12.5px; color:#4B5563;">{{ b.costLabel }} / max {{ b.maxCostLabel }}</span>
      </div>
      <div style="height:8px; border-radius:99px; background:#EEF0F2; margin:14px 0; overflow:hidden;">
        <div style="height:100%; background:{{ accentColor }}; width:{{ b.costPct }};"></div>
      </div>
      <sc-for list="{{ b.children }}" as="c" hint-placeholder-count="3">
        <div onClick="{{ c.onOpen }}" style="display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #F5F6F8; font-size:12.5px; cursor:pointer;">
          <span style="font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:6px; color:{{ c.flowFg }}; background:{{ c.flowBg }};">{{ c.flowLabel }}</span>
          <span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:#6B7280;">{{ c.shortId }}</span>
          <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ c.target }}</span>
          <span style="font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; color:{{ c.statusFg }}; background:{{ c.statusBg }};">{{ c.statusLabel }}</span>
        </div>
      </sc-for>
      <div style="display:flex; justify-content:flex-end; margin-top:14px;">
        <div style="font-size:12.5px; font-weight:700; color:#fff; background:{{ accentColor }}; padding:8px 14px; border-radius:8px; cursor:pointer;">Apply all verified</div>
      </div>
    </div>
  </sc-for>
  <sc-if value="{{ isEmpty }}">
    <div style="padding:60px; text-align:center; color:#9CA3AF; background:#fff; border:1px solid #E4E6EB; border-radius:12px;">No batch runs yet.</div>
  </sc-if>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1180, &quot;height&quot;: 700}}">
class Component extends DCLogic {
  renderVals() {
    const openManifest = this.props.openManifest || (() => {});
    const batches = (this.props.batches || []).map(b => ({
      ...b,
      maxCostLabel: '$' + (b.maxCost || 5).toFixed(2),
      costPct: Math.min(100, Math.round((b.raw.cost / (b.maxCost || 5)) * 100)) + '%',
      children: (b.children || []).map(c => ({ ...c, onOpen: () => openManifest(c.id) })),
    }));
    return { batches, isEmpty: batches.length === 0, accentColor: this.props.accentColor ?? '#6D5EF0' };
  }
}

</script>
</body>
</html>
