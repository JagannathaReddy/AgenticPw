<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; gap:16px; max-width:1180px;">
  <sc-for list="{{ repos }}" as="r" hint-placeholder-count="3">
    <div style="background:#fff; border:1px solid #E4E6EB; border-radius:12px; overflow:hidden;">
      <div onClick="{{ r.onToggle }}" style="display:flex; align-items:center; gap:14px; padding:16px 20px; cursor:pointer;">
        <span style="width:9px; height:9px; border-radius:50%; background:{{ r.healthFg }}; flex:none;"></span>
        <span style="font-size:14.5px; font-weight:700; flex:none;">{{ r.label }}</span>
        <span style="font-size:12px; color:#9CA3AF;">{{ r.tests }} tests · flaky {{ r.flaky }} · broken {{ r.broken }}</span>
        <div style="flex:1;"></div>
        <span style="font-size:11.5px; font-weight:700; padding:3px 10px; border-radius:99px; color:{{ r.healthFg }}; background:{{ r.healthBg }};">{{ r.healthLabel }}</span>
        <span style="font-size:12px; color:#9CA3AF;">last steward run {{ r.lastReport }}</span>
        <span style="font-size:13px; color:#9CA3AF;">{{ r.chevron }}</span>
      </div>
      <sc-if value="{{ r.expanded }}">
        <div style="padding:0 20px 18px; border-top:1px solid #EEF0F2;">
          <div style="display:flex; gap:10px; margin:14px 0;">
            <div style="font-size:12px; font-weight:600; color:#4B5563; padding:7px 12px; border:1px solid #E4E6EB; border-radius:8px; cursor:pointer;">Run Steward</div>
            <div style="font-size:12px; font-weight:600; color:#4B5563; padding:7px 12px; border:1px solid #E4E6EB; border-radius:8px; cursor:pointer;">Run Doctor (scoped)</div>
            <div style="font-size:12px; font-weight:600; color:#4B5563; padding:7px 12px; border:1px solid #E4E6EB; border-radius:8px; cursor:pointer;">Manage storage state</div>
          </div>
          <div style="font-size:11.5px; font-weight:700; color:#9CA3AF; text-transform:uppercase; margin-bottom:8px;">Recent manifests</div>
          <sc-for list="{{ r.recentManifests }}" as="m" hint-placeholder-count="3">
            <div style="display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #F5F6F8; font-size:12.5px;">
              <span style="font-size:10.5px; font-weight:700; padding:2px 7px; border-radius:6px; color:{{ m.flowFg }}; background:{{ m.flowBg }};">{{ m.flowLabel }}</span>
              <span style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace; color:#6B7280;">{{ m.shortId }}</span>
              <span style="flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">{{ m.target }}</span>
              <span style="font-size:11px; font-weight:700; padding:2px 8px; border-radius:99px; color:{{ m.statusFg }}; background:{{ m.statusBg }};">{{ m.statusLabel }}</span>
            </div>
          </sc-for>
        </div>
      </sc-if>
    </div>
  </sc-for>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;: {&quot;width&quot;: 1180, &quot;height&quot;: 700}}">
class Component extends DCLogic {
  state = { expanded: {} };
  renderVals() {
    const exp = this.state.expanded;
    const repos = (this.props.repos || []).map(r => ({
      ...r, expanded: !!exp[r.name], chevron: exp[r.name] ? '▾' : '▸',
      onToggle: () => this.setState(s => ({ expanded: { ...s.expanded, [r.name]: !s.expanded[r.name] } })),
    }));
    return { repos };
  }
}

</script>
</body>
</html>
