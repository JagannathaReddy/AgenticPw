# Local dev stack for the test-agent platform.
#
# Just Postgres for now. Everything else (API, worker, prompts, playwright)
# runs on the host so you can iterate with a hot-reloading Node process,
# debugger, and native Playwright browsers.
#
# Usage:
#   docker compose up -d           # start postgres in the background
#   bash scripts/dev-up.sh         # apply migrations + seed dev tenant
#   npm run dev                    # start api + worker
#   docker compose down -v         # tear down (drops the volume!)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: test-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform
      POSTGRES_DB: platform
    ports:
      # 5433 on host to avoid clashing with a native Postgres on 5432.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U platform -d platform']
      interval: 3s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
    name: test-agent-postgres-data
