services:
  agent-server:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - AGENT_HOST=0.0.0.0
      - AGENT_PORT=3847
      - AGENT_ALLOWED_HOSTS=127.0.0.1,localhost
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: sh -c "npm run agent:build && npm run agent:start"
    ports:
      - '3847:3847'
